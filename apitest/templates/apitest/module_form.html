{# apitest/templates/apitest/module_form.html #}
{% extends 'apitest/base.html' %}

{% block content %}
<h2>{% if module %}编辑服务{% else %}新建服务{% endif %}</h2>

<form method="post" style="max-width: 600px;">
    {% csrf_token %}
    
    <div class="form-group">
        <label>服务名称 <span style="color: #ef4444;">*</span></label>
        <input 
            type="text" 
            name="name" 
            value="{{ module.name|default:'' }}" 
            required 
            placeholder="例如：bill"
        >
    </div>
    
    <div class="form-group">
        <label>服务描述</label>
        <textarea 
            name="description" 
            rows="4" 
            placeholder="请输入服务描述信息（可选）"
        >{{ module.description|default:'' }}</textarea>
    </div>
    
    <div class="form-group">
        <label>Git地址</label>
        <input 
            type="text" 
            name="git_url" 
            value="{{ module.git_url|default:'' }}"
            placeholder="例如：http://123.com/user/repo.git"
        >
        <small style="color: #94a3b8; display: block; margin-top: 6px;">示例：http://123.com/user/repo.git</small>
    </div>
    
    <div style="display: flex; gap: 12px; margin-top: 24px;">
        <button type="submit" class="btn">保存</button>
        <a href="{% url 'apitest:module_list' %}" class="btn btn-secondary">取消</a>
    </div>
</form>
{% endblock %}
