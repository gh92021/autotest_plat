{# apitest/templates/apitest/env_form.html #}
{% extends 'apitest/base.html' %}

{% block content %}
<h2>{% if env %}编辑环境{% else %}新建环境{% endif %}</h2>

<form method="post" style="max-width: 600px;">
    {% csrf_token %}
    
    <div class="form-group">
        <label>环境名称 <span style="color: #ef4444;">*</span></label>
        <input 
            type="text" 
            name="name" 
            value="{{ env.name|default:'' }}" 
            required 
            placeholder="例如：bill-dev-1"
        >
    </div>
    
    <div class="form-group">
        <label>环境描述</label>
        <textarea 
            name="description" 
            rows="4" 
            placeholder="请输入环境描述信息（可选）"
        >{{ env.description|default:'' }}</textarea>
    </div>
    
    {% if not env %}
    <div class="form-group">
        <label>所属服务 <span style="color: #ef4444;">*</span></label>
        <select name="module" required>
            <option value="">请选择服务</option>
            {% for module in modules %}
            <option value="{{ module.id }}" {% if env.module_id == module.id %}selected{% endif %}>{{ module.name }}</option>
            {% endfor %}
        </select>
    </div>
    {% endif %}

    <div class="form-group">
        <label>环境基础URL <span style="color: #ef4444;">*</span></label>
        <input 
            type="text" 
            name="base_url" 
            value="{{ env.base_url|default:'http://localhost:8000' }}"
            placeholder="例如：http://localhost:8000"
        >
        <small style="color: #94a3b8; display: block; margin-top: 6px;">示例：http://localhost:8000</small>
    </div>
    
    <div style="display: flex; gap: 12px; margin-top: 24px;">
        <button type="submit" class="btn">保存</button>
        <a href="{% url 'apitest:env_list' %}" class="btn btn-secondary">取消</a>
    </div>
</form>
{% endblock %}
